# Sophie Agent Services
# Deploy to: aiclient (192.168.20.112)

services:
  agent-service:
    build: ./agent-service
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      LLAMA_URL: "http://192.168.20.116:8080"
      STT_URL: "http://192.168.20.116:8091"
      TTS_URL: "http://127.0.0.1:8092"
      MEMORY_API_URL: "http://127.0.0.1:8002"
      OPENWAKEWORD_URL: "http://127.0.0.1:8093"
      ALERTS_ENABLED: "true"
      EMAIL_GMAIL_ENABLED: "true"
      EMAIL_GMAIL_USER: "kirbrit@gmail.com"
      EMAIL_OUTLOOK_ENABLED: "true"
      EMAIL_OUTLOOK_USER: "isuspgr@hotmail.com"
    depends_on:
      - piper-tts
    restart: unless-stopped

  piper-tts:
    build: ./tts
    ports:
      - "8092:8092"
    environment:
      PIPER_MODEL: "/models/amy/en_US-amy-medium.onnx"
    restart: unless-stopped

  openwakeword:
    build: ./openwakeword
    ports:
      - "8093:8093"
    environment:
      WAKE_WORD: "sophie"
      WAKE_THRESHOLD: "0.8"
    devices:
      - /dev/snd:/dev/snd
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8888:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      SEARXNG_SETTINGS_PATH: "/etc/searxng/settings.yml"
      SEARXNG_BASE_URL: "http://localhost:8888/"
    restart: unless-stopped

  desktop-client:
    build: ./desktop-client
    environment:
      AGENT_URL: "http://127.0.0.1:8090"
      OPENWAKEWORD_URL: "http://127.0.0.1:8093"
      ALERTS_ENABLED: "true"
    devices:
      - /dev/snd:/dev/snd
    network_mode: "host"
  telegram-bot:
    build: ./telegram-bot
    network_mode: host
    environment:
      TELEGRAM_BOT_TOKEN: "8828982393:AAF-dnEfIob2gLjYN6y8LVUacjKrcfGf3hw"
      TELEGRAM_AUTHORIZED_IDS: "7875283898"
      SOPHIE_URL: "http://127.0.0.1:8090"
    restart: unless-stopped
