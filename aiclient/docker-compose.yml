# ── Sophie Agent Services ──
# Deploy to: aiclient (192.168.20.112)

services:
  # Agent Service — orchestrator, chat, STT/TTS proxy, web UI
  agent-service:
    build: ./agent-service
    ports:
      - "8090:8090"
    network_mode: host
    environment:
      LLAMA_URL: "http://192.168.20.116:8080"
      STT_URL: "http://192.168.20.116:8091"
      TTS_URL: "http://127.0.0.1:8092"
      MEMORY_API_URL: "http://192.168.20.116:8002"
      OPENWAKEWORD_URL: "http://127.0.0.1:8093"
    depends_on:
      - piper-tts
    restart: unless-stopped

  # Piper TTS — local, fast speech synthesis
  piper-tts:
    build: ./tts
    ports:
      - "8092:8092"
    environment:
      PIPER_MODEL: "/models/amy/en_US-amy-medium.onnx"
    restart: unless-stopped

  # openWakeWord — wake word detection ("sophie")
  openwakeword:
    build: ./openwakeword
    ports:
      - "8093:8093"
    environment:
      WAKE_WORD: "sophie"
      WAKE_THRESHOLD: "0.6"
    devices:
      - /dev/snd:/dev/snd
    restart: unless-stopped

  # Desktop Voice Client — continuous listening loop
  # Run manually: docker compose run --rm desktop-client
  desktop-client:
    build: ./desktop-client
    environment:
      AGENT_URL: "http://127.0.0.1:8090"
      OPENWAKEWORD_URL: "http://127.0.0.1:8093"
    devices:
      - /dev/snd:/dev/snd
    network_mode: "host"
